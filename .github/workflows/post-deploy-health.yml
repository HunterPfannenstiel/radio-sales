name: Post-Deploy Health Check

on: deployment_status

jobs:
  health-check:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        run: |
          URL="${{ github.event.deployment_status.target_url }}/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --retry 5 --retry-delay 3 --retry-connrefused \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            "$URL")
          echo "Checked $URL -> $STATUS"
          [ "$STATUS" = "200" ] || exit 1
