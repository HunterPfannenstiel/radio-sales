name: Post-Deploy Smoke Test

on: deployment_status

jobs:
  e2e-smoke:
    if: |
      github.event.deployment_status.state == 'success' &&
      contains(fromJSON('["main", "integration"]'), github.event.deployment.ref)
    runs-on: ubuntu-latest
    environment: ${{ github.event.deployment.ref == 'main' && 'production' || 'integration' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e:smoke
        env:
          BASE_URL: ${{ github.event.deployment.ref == 'main' && vars.PRODUCTION_URL || vars.INTEGRATION_URL }}
          CANARY_LOGIN_NAME: ${{ secrets.CANARY_LOGIN_NAME }}
          CANARY_LOGIN_PIN: ${{ secrets.CANARY_LOGIN_PIN }}
